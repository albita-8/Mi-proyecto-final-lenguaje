<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="../css/cancion.css" />
  <link rel="icon" href="../assets/images/icono.png" type="image/png">
  <title>Canciones Disney - The API of Wonderland</title>
</head>
<body>

  <header class="cabecera">
    <nav class="navegador">
      <ul>
        <li class="nav-menu"><a href="../index.html">Inicio<img src="../assets/images/nav_Inicio.png" alt="Inicio" class="nav-img"></a></li>
        <li class="nav-menu"><a href="perfil.html">Perfil<img src="../assets/images/nav_Perfil.png" alt="Perfil" class="nav-img"></a></li>
        <li class="nav-menu"><a href="sobre-nosotras.html">Sobre Nosotros<img src="../assets/images/nav_Nosotros.png" alt="Sobre Nosotros" class="nav-img"></a></li>
      </ul>
    </nav>
  </header>

  <main>

    <!-- ── FORMULARIO CRUD ── -->
    <section class="crud-section">
      <h2 class="crud-title">🎼 Gestionar Canciones</h2>

      <div class="crud-form">
        <!-- ID oculto, se rellena al cargar un registro para editar -->
        <input type="hidden" id="cancionId" />

        <div>
          <label for="cancionNombreActual">Nombre actual (para Modificar / Eliminar)</label>
          <input type="text" id="cancionNombreActual" placeholder="Ej: Let It Go" maxlength="50" />
        </div>

        <div>
          <label for="cancionNombre">Nombre nuevo (para Crear / Modificar) *</label>
          <input type="text" id="cancionNombre" placeholder="Ej: Into the Unknown" maxlength="50" />
        </div>

        <div class="crud-buttons">
          <button class="btn-crud btn-crear"   onclick="crearCancion()">Crear</button>
          <button class="btn-crud btn-editar"  onclick="editarCancion()">Modificar</button>
          <button class="btn-crud btn-borrar"  onclick="eliminarCancion()">Eliminar</button>
          <button class="btn-crud btn-limpiar" onclick="limpiarFormulario()">Limpiar</button>
        </div>

        <p id="crudMsg" class="crud-msg"></p>
      </div>
    </section>

    <!-- ── LISTADO ── -->
    <section class="canciones-section">
      <h2 class="canciones-title">🎵 Bandas Sonoras Disney</h2>
      <p class="canciones-subtitle">Escucha la magia de nuestras películas</p>

      <div class="canciones-grid" id="cancionesGrid">
        <p class="cargando">Afinando las voces...</p>
      </div>
    </section>

  </main>

  <footer class="pie">
    <ul>
      <li><a href="https://www.instagram.com/disney/"><img src="../assets/images/pie_Instagram.png" alt="Instagram"></a></li>
      <li><a href="https://www.tiktok.com/@disney"><img src="../assets/images/pie_TikTok.png" alt="TikTok"></a></li>
    </ul>
    <p>The API of Wonderland © 2024</p>
  </footer>

  <script src="../js/javascript.js"></script>
</body>
</html>
