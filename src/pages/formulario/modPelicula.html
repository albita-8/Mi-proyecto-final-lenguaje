<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Alba Agüera Cuadra, Elisabet Soria Zaitseva" />
    <link rel="stylesheet" href="../../css/styles.css">
    <link rel="icon" href="../../assets/images/icono.png" type="image/png">
    <title>Canciones Disney</title>
</head>

<body>
    <header class="cabecera">
        <nav class="navegador">
            <ul>
                <li class="nav-menu"><a href="../../index.html">Inicio<img src="../../assets/images/nav_Inicio.png"
                            alt="Inicio" class="nav-img"></a></li>
                <li class="nav-menu"><a href="../visita.html">Visita Disney<img src="../../assets/images/nav_visita.png"
                            alt="Perfil" class="nav-img"></a></li>
                <li class="nav-menu"><a href="../sobre-nosotras.html">Sobre Nosotros<img
                            src="../../assets/images/nav_Nosotros.png" alt="Sobre Nosotros" class="nav-img"></a></li>
            </ul>
        </nav>
    </header>

    <main class="form-peli mod-peli-prin">
        <form id="form-mod-peli" enctype="multipart/form-data">
            <h2>Modifica una Película</h2>
            <input type="hidden" class="mod-CodPel" name="CodPel" value="">

            <fieldset>
                <legend>Escribe aquí tus datos</legend>
                <div class="ele-form-peli">
                    <label>PELÍCULA A MODIFICAR (Nombre Actual):</label>
                    <input type="text" id="mod-NomPel" placeholder="Ej: El Rey León" required>
                </div>

                <p>Rellena SOLO los campos que quieras cambiar:</p>

                <div class="ele-form-peli">
                    <label>Nuevo Nombre:</label>
                    <input type="text" class="mod-NomPel-new" name="NomPel" maxlength="50">
                </div>

                <div class="ele-form-peli">
                    <label>Año / Fecha de Estreno:</label>
                    <input type="date" class="mod-AnoPel" name="AnoPel" maxlength="15">
                </div>

                <div class="ele-form-peli">
                    <label>Género:</label>
                    <input type="text" class="mod-GenPel" name="GenPel" maxlength="15">
                </div>

                <div class="ele-form-peli">
                    <label>Duración (minutos):</label>
                    <input type="number" class="mod-MinPel" name="MinPel" min="1">
                </div>

                <div class="ele-form-peli">
                    <label>Imagen de la Película:</label>
                    <input type="file" class="mod-ImgPel" name="ImgPel" accept="image/*">
                </div>

                <div class="ele-form-peli">
                    <label>Sinopsis:</label>
                    <textarea class="mod-SinPel" name="SinPel" maxlength="500" rows="4" cols="50"></textarea>
                </div>

            </fieldset>

            <button type="submit" onclick="modificarPelicula()">Modificar Película</button>

        </form>
    </main>

    <footer class="pie">
        <ul>
            <li><a href="https://www.instagram.com/disney/"><img src="../../assets/images/pie_Instagram.png"
                        alt="Instagram de Disney"></a></li>
            <li><a href="https://www.tiktok.com/@disney?lang=es-419"><img src="../../assets/images/pie_TikTok.png"
                        alt="TikTok de Disney"></a></li>
            <li><a href="https://www.disney.es/"><img src="../../assets/images/pie_Disney.png"
                        alt="Página de Disney"></a></li>
            <li><a href="https://x.com/DisneySpain"><img src="../../assets/images/pie_X.png"
                        alt="Twitter de Disney"></a></li>
        </ul>
    </footer>

    <script src="../../js/javascript.js"></script>
</body>

</html>
