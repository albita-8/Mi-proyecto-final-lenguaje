<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Alba Agüera Cuadra, Elisabet Soria Zaitseva" />
    <link rel="stylesheet" href="../../css/styles.css">
    <link rel="icon" href="../../assets/images/icono.png" type="image/png">
    <title>Canciones Disney</title>
</head>

<body>
    <header class="cabecera">
        <nav class="navegador">
            <ul>
                <li class="nav-menu"><a href="../index.html">Inicio<img src="../../assets/images/nav_Inicio.png"
                            alt="Inicio" class="nav-img"></a></li>
                <li class="nav-menu"><a href="../visita.html">Visita Disney<img src="../../assets/images/nav_visita.png"
                            alt="Perfil" class="nav-img"></a></li>
                <li class="nav-menu"><a href="sobre-nosotras.html">Sobre Nosotros<img
                            src="../../assets/images/nav_Nosotros.png" alt="Sobre Nosotros" class="nav-img"></a></li>
            </ul>
        </nav>
    </header>

    <main class="form-pers cre-pers-prin">
        <h2>Crea un Personaje</h2>
        <form id="form-cre-pers" enctype="multipart/form-data">
            </fieldset>
            <div class="ele-form-pers">
                <label>Nombre del Personaje:</label>
                <input type="text" class="cre-NomPer" name="NomPer" maxlength="50" required>
            </div>

            <div class="ele-form-pers">
                <label>Edad:</label>
                <input type="number" class="cre-EdaPer" name="EdaPer" min="0" required>
            </div>

            <div class="ele-form-pers">
                <label>Tipo:</label>
                <input type="text" class="cre-TipPer" name="TipPer" maxlength="50"
                    placeholder="Ej: Protagonista, Villano, Secundario" required>
            </div>

            <div class="ele-form-pers">
                <label>Especie:</label>
                <input type="text" class="cre-EspPer" name="EspPer" maxlength="50" placeholder="Ej: León, Humano…">
            </div>

            <div class="ele-form-pers">
                <label>Alias:</label>
                <input type="text" class="cre-AliPer" name="AliPer" maxlength="20" placeholder="La reina de las Nieves">
            </div>

            <div class="ele-form-pers">
                <label>Género:</label>
                <select class="cre-GenPer" name="GenPer" required>
                    <option value="">-- Selecciona --</option>
                    <option value="Masculino">Masculino</option>
                    <option value="Femenino">Femenino</option>
                    <option value="Desconocido">Desconocido</option>
                </select>
            </div>

            <div class="ele-form-pers">
                <label>Descripción:</label>
                <textarea class="cre-DesPer" name="DesPer" maxlength="500" rows="4" cols="50"
                    placeholder="Sin Descripción"></textarea>
            </div>

            <div class="ele-form-pers">
                <label>Imagen del Personaje:</label>
                <input type="file" class="cre-ImgPer" name="ImgPer" accept="image/*">
            </div>

            <div class="ele-form-pers">
                <label>Reino:</label>
                <select class="cre-CodRei" name="CodRei" required>
                    <option value="">-- Selecciona un reino --</option>
                </select>
            </div>
            </fieldset>
            <button type="submit">Crear Personaje</button>
        </form>

    </main>

    <footer class="pie">
        <ul>
            <li><a href="https://www.instagram.com/disney/"><img src="../../assets/images/pie_Instagram.png"
                        alt="Instagram de Disney"></a></li>
            <li><a href="https://www.tiktok.com/@disney?lang=es-419"><img src="../../assets/images/pie_TikTok.png"
                        alt="TikTok de Disney"></a></li>
            <li><a href="https://www.disney.es/"><img src="../../assets/images/pie_Disney.png"
                        alt="Página de Disney"></a></li>
            <li><a href="https://x.com/DisneySpain"><img src="../../assets/images/pie_X.png"
                        alt="Twitter de Disney"></a></li>
        </ul>
    </footer>

    <script src="../../js/javascript.js"></script>
</body>

</html>
