    <h2>Eliminar Película</h2>
    <p>Introduce el nombre exacto de la película que deseas eliminar del sistema de forma permanente.</p>
    <form id="form-del-peli">

    <fieldset>
        <legend>Zona de Peligro — Eliminar Película</legend>

        <div class="ele-form-peli">
            <label>Nombre de la Película:</label>
            <input type="text" id="del-NomPel" name="NomPel" maxlength="50" placeholder="Ej: El Rey León" required>
        </div>

    </fieldset>

    <button type="submit" onclick="eliminarPelicula()">Eliminar Película</button>

</form>
