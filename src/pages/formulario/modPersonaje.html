  <main class="form-pers mod-pers-prin">
     <form id="form-mod-pers" enctype="multipart/form-data">
            <h2>Modifica un Personaje</h2>
            <input type="hidden" class="mod-CodPer" name="CodPer" value="">

            <div class="ele-form-pers">
                    <label for="mod-NomPer-Original">Nombre del personaje a modificar (Obligatorio):</label>
                    <input type="text" id="mod-NomPer" placeholder="Ej: Elsa" required>
                </div>

               
                <p >Rellena SOLO los campos que desees cambiar:</p>

                <div class="ele-form-pers">
                    <label for="mod-NomPer">Nuevo Nombre:</label>
                    <input type="text" id="mod-NomPer-new" name="NomPer" maxlength="50" placeholder="Ej: Simba">
                </div>

                <div class="ele-form-pers">
                    <label for="mod-EdaPer">Nueva Edad:</label>
                    <input type="number" id="mod-EdaPer" name="EdaPer" placeholder="Ej: 18">
                </div>

                <div class="ele-form-pers">
                    <label for="mod-TipPer">Nuevo Tipo (Rol):</label>
                    <input type="text" id="mod-TipPer" name="TipPer" maxlength="50" placeholder="Ej: Protagonista">
                </div>

                <div class="ele-form-pers">
                    <label for="mod-EspPer">Nueva Especie:</label>
                    <input type="text" id="mod-EspPer" name="EspPer" maxlength="50" placeholder="Ej: Humano">
                </div>

                <div class="ele-form-pers">
                    <label for="mod-ImgPer">Nueva Imagen:</label>
                    <input type="file" id="mod-ImgPer" name="ImgPer" accept="image/*" class="mod-ImgPer">
                </div>

                <div class="ele-form-pers">
                    <label for="mod-DesPer">Nueva Descripción:</label>
                    <textarea id="mod-DesPer" name="DesPer" maxlength="500" rows="4" cols="50" placeholder="Escribe la nueva descripción..."></textarea>
                </div>

                <div class="ele-form-pers">
                    <label>Nuevo Reino Asociado:</label>
                    <select class="mod-NomRei" name="CodRei">
                        <option value="">-- No modificar reino u opción actual --</option>
                    </select>
                </div>

            </fieldset>

            <button type="submit">Modificar Personaje</button>

        </form>

  </main>
