<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="author" content="Alba Agüera Cuadra, Elisabet Soria Zaitseva" />
  <title>The API of Wonderland 🏰</title>
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- ══ HEADER ══════════════════════════════════════ -->
  <header>
    <span class="castle-emoji" aria-hidden="true">🏰</span>
    <h1>The API of Wonderland</h1>
    <p class="subtitle">Explora el universo mágico de Disney</p>
  </header>

  <!-- ══ NAV ═════════════════════════════════════════ -->
  <nav aria-label="Navegación principal">
    <button class="tab active" data-section="personajes">✨ Personajes</button>
    <button class="tab" data-section="peliculas">🎬 Películas</button>
    <button class="tab" data-section="reinos">🗺️ Reinos</button>
    <button class="tab" onclick="window.location.href='pages/sobre-nosotras.html'">👑 Sobre Nosotras</button>
  </nav>

  <!-- ══ MAIN ════════════════════════════════════════ -->
  <main>

    <!-- Sección Personajes -->
    <section id="sec-personajes">
      <div class="search-bar">
        <input type="text" id="search-personajes" placeholder="Buscar personaje..." />
        <button class="btn-search" id="btn-buscar">Buscar</button>
      </div>
      <div class="count-info" id="count-personajes"></div>
      <div class="grid" id="grid-personajes">
        <div class="status"><div class="spinner"></div>Cargando personajes...</div>
      </div>
    </section>

    <!-- Sección Películas -->
    <section id="sec-peliculas" style="display:none">
      <div class="count-info" id="count-peliculas"></div>
      <div id="list-peliculas">
        <div class="status"><div class="spinner"></div>Cargando películas...</div>
      </div>
    </section>

    <!-- Sección Reinos -->
    <section id="sec-reinos" style="display:none">
      <div class="count-info" id="count-reinos"></div>
      <div id="list-reinos">
        <div class="status"><div class="spinner"></div>Cargando reinos...</div>
      </div>
    </section>

  </main>

  <!-- ══ MODAL detalle personaje ═════════════════════ -->
  <div class="overlay" id="modal-overlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <div class="modal-title" id="modal-title"></div>
        <button class="modal-close" id="btn-cerrar-modal" aria-label="Cerrar">✕</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <!-- ══ FOOTER ══════════════════════════════════════ -->
  <footer>
    <p>✨ The API of Wonderland &mdash; Alba Agüera Cuadra &amp; Elisabet Soria Zaitseva &mdash; DAW 2024/25</p>
  </footer>

  <script src="js/javascript.js"></script>
</body>
</html>
